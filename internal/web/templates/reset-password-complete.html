<!DOCTYPE html>
<html lang="{{ .lang }}">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
        <title>SwayRider - {{ call .sw_i18n "reset_password_complete" }}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
        <style>
            body { font-family: 'Roboto', sans-serif; }
        </style>
    </head>
    <body>
        <main>
            <div class="container mt-5">
                <div class="row justify-content-center">
                    <div class="col-md-6 text-center">
                        <h1 class="mb-5">SwayRider</h1>
                        <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" fill="green" class="bi bi-check-circle mb-4" viewBox="0 0 16 16">
                            <path d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14zm0 1A8 8 0 1 1 8 0a8 8 0 0 1 0 16z"/>
                            <path d="M10.97 5.97a.235.235 0 0 0-.34-.006L7.477 9.417 5.383 7.323a.235.235 0 0 0-.332.332l2.5 2.5a.235.235 0 0 0 .332 0l3.085-3.085a.235.235 0 0 0-.003-.332z"/>
                        </svg>
                        <h2 class="mb-3">{{ call .sw_i18n "reset_password_complete" }}</h2>
                        <p class="lead mb-4">{{ call .sw_i18n "reset_password_complete_description" }}</p>
                        {{ if and .sw_isMobileAppBrowser .sw_appURL }}
                            <a href="{{ .sw_appURL }}" class="btn btn-lg btn-primary">{{ call .sw_i18n "return_to_app" }}</a>
                        {{ end }}
                    </div>
                </div>
            </div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    </body>
</html>
