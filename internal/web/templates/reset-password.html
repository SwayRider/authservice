<!DOCTYPE html>
<html lang="{{ .lang }}">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
        <title>SwayRider - {{ call .sw_i18n "reset_password" }}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
        <style>
            body { font-family: 'Roboto', sans-serif; }
        </style>
    </head>
    <body>
        <main>
            <div class="container mt-5">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <h1 class="mb-4 text-center">SwayRider</h1>
                        <h2 class="mb-3">{{ call .sw_i18n "reset_password" }}</h2>
                        <p class="mb-4">{{ call .sw_i18n "reset_password_description" }}</p>

                        {{ if .error }}
                        <div class="alert alert-danger" role="alert">
                            {{ .error }}
                        </div>
                        {{ end }}

                        <form method="POST">
                            <input type="hidden" name="u" value="{{ .u }}">
                            <input type="hidden" name="t" value="{{ .t }}">
                            <div class="mb-3">
                                <label for="new_password" class="form-label">{{ call .sw_i18n "reset_password_new_password" }}</label>
                                <input type="password" class="form-control" id="new_password" name="new_password" required>
                            </div>
                            <div class="mb-4">
                                <label for="confirm_password" class="form-label">{{ call .sw_i18n "reset_password_confirm_password" }}</label>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">{{ call .sw_i18n "reset_password_submit" }}</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    </body>
</html>
